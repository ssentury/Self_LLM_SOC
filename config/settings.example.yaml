# Copy to config/settings.local.yaml for machine-specific settings.
schema_version: 1

runtime:
  input: data/sample/xgb_route_sample.csv
  output: output/reports

storage:
  enabled: true
  sqlite_path: output/soc_events.sqlite

detector:
  provider: xgboost
  model: output/models/xgb_binary_v1.json
  metadata: output/models/xgb_binary_v1_metadata.json
  thresholds: output/models/xgb_binary_v1_thresholds_routing_default.json
  category_model: output/models/xgb_attack_hint_v1.json
  category_metadata: output/models/xgb_attack_hint_v1_metadata.json

routing:
  threshold_low: 0.30
  threshold_high: 0.95
  priority_1_llm_threshold: 0.20

tier1:
  llm:
    # Keep fake as the repeatable default. Use --llm ollama for real local Tier 1.
    provider: fake
    model: gemma4:e4b
    ollama_url: http://localhost:11434
    timeout_seconds: 180
  queue:
    mode: queue
    workers: 1
    max_size: 100
    timeout_seconds: 300
    overflow_policy: fallback
    priority_policy: watchlist_first
    max_calls_per_run: 0

tier2:
  provider: fake
  model: fake-tier2
  sources:
    assets:
      enabled: true
      path: config/assets.example.yaml
    policy:
      enabled: true
      path: config/policy.example.yaml
    cve_feed:
      enabled: true
      path: config/cve_feed.example.yaml
    threat_feed:
      enabled: true
      path: config/threat_feed.example.yaml
  watchlist: output/watchlists/latest.yaml
  brief: output/briefs/latest.md
  memory: output/memory/latest.md
