    threat_feed: "base/threat_feed.yaml + overlays/day04_inventory_and_ioc.yaml + overlays/day05_cve_fortimanager.yaml"

review_expectations:
  cve_additions:
    day03: ["CVE-2025-24813"]
    day05: ["CVE-2024-47575"]
  no_new_cve_days: [1, 2, 4]
  key_negative_controls:
    - "normal clinic workstation to lab-results-api after day 3"
    - "admin-jumpbox to firewall-manager TCP/541 on day 5"
    - "doctor laptop to PACS during business hours"
  evaluation_slices:
    - "overall precision/recall/f1"
    - "day01-day02 pre-change metrics"
    - "day03-day05 post-change metrics"
    - "CVE-2025-24813 recall and benign false-positive rate"
    - "CVE-2024-47575 recall and benign false-positive rate"
    - "low-ML contextual attack recall"
    - "Infilteration-family recall"
    - "watchlist-adjusted route count"
    - "false positives caused by watchlist threshold lowering"
