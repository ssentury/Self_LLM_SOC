scenario:
  name: "regional_care_dynamic_cve_5day"
  start_date: "2026-05-02"
  timezone: "Asia/Seoul"
  days: 5
  flows_per_day: 200
  total_flows: 1000
  benign_per_day: 180
  malicious_per_day: 20
  total_benign: 900
  total_malicious: 100
  csv_target: "data/sample/regional_care_dynamic_cve_flows_xgb.csv"
  manifest_target: "data/sample/regional_care_dynamic_cve_flows_xgb_manifest.json"

source_dataset_contract:
  source: "Dataset/NF-CICIDS2018-v3.csv"
  preserve_model_features: true
  forbid_mock_prob: true
  benign_selection: "source-order contiguous benign windows, grouped by service-port needs"
  attack_selection: "real attack-label rows selected by label and preferred destination port when available"
  allowed_projection_fields:
    - "flow_id"
    - "IPV4_SRC_ADDR"
    - "IPV4_DST_ADDR"
    - "L4_SRC_PORT"
    - "L4_DST_PORT when scenario service requires it"
    - "FLOW_START_MILLISECONDS"
    - "FLOW_END_MILLISECONDS"
  protocol_rule: "Preserve PROTOCOL whenever possible; record any protocol override as a manifest projection exception."
  manifest_required_fields:
    - "flow_id"
    - "scenario"
    - "label"
    - "attack"
    - "source_index"
    - "source_stage"
    - "source_attack"
    - "source_dst_port"
    - "output_dst_port"
    - "source_protocol"
    - "output_protocol"
    - "projection_reason"

columns:
  include_flow_id: true
  include_all_binary_xgb_features: true
  include_label: true
  include_attack: true
  disallow_columns: ["mock_prob"]

attack_slots_by_day:
  day01: [7, 16, 24, 33, 41, 58, 67, 76, 88, 97, 106, 118, 127, 136, 148, 157, 166, 178, 187, 196]
  day02: [5, 14, 23, 39, 48, 57, 69, 78, 87, 96, 109, 119, 128, 137, 146, 158, 169, 179, 188, 198]
