business_hours:
  weekday: [8, 19]
  timezone: "Asia/Seoul"
maintenance_windows:
  - name: "nightly-backup"
    time_range: "02:00-04:00 Asia/Seoul"
    allowed_sources: ["10.42.40.10", "10.42.50.8"]
elevated_risk_rules:
  - condition: "external-unknown -> dmz-public vpn-gateway repeated failures"
    severity_boost: "+1"
    rationale: "VPN credential attacks are common initial access paths for small healthcare providers."
  - condition: "external-unknown -> internal-db"
    severity_boost: "+2"
    rationale: "Direct internet-origin database access is never expected."
  - condition: "clinic-workstations -> internal-backup smb outside backup window"
    severity_boost: "+1"
    rationale: "Backup tampering is a ransomware precursor."
  - condition: "internal host -> 169.254.169.254"
    severity_boost: "+2"
    rationale: "Cloud metadata access from application or workstation hosts may indicate credential theft."
asset_specific_policies:
  - asset: "203.0.113.10"
    rule: "Public HTTP/HTTPS is allowed, but admin paths and exploit-like probing should be escalated."
  - asset: "203.0.113.20"
    rule: "VPN HTTPS is allowed from the internet; repeated failures, unusual sources, or exploit patterns are high risk."
  - asset: "10.42.30.25"
    rule: "Postgres access is allowed only from 10.42.20.15 and approved admin hosts."
  - asset: "10.42.40.12"
    rule: "SMB backup traffic is expected only during the backup window and from backup/admin hosts."
  - asset: "10.42.50.8"
    rule: "SSH/RDP to the jumpbox is allowed only from admin or VPN-controlled sources."
policies:
  - id: "P-IMDS"
    content: "No user workstation should directly query cloud metadata service 169.254.169.254."
  - id: "P-DNS"
    content: "High-volume external DNS from workstations should be reviewed for tunneling."
