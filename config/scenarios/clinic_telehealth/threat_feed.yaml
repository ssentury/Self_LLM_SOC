    tags: ["vpn-bruteforce", "ransomware-initial-access"]
    confidence: "high"
  - ip: "198.51.100.88"
    tags: ["php-cgi-rce-prober", "web-rce-scanner"]
    confidence: "high"
  - ip: "198.51.100.90"
    tags: ["database-scanner", "exposed-postgres-probing"]
    confidence: "medium"
  - ip: "192.0.2.210"
    tags: ["web-scanner", "directory-enumeration"]
